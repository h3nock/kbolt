name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-artifacts:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_os: linux
            archive_arch: x86_64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            archive_os: macos
            archive_arch: x86_64
          - runner: macos-14
            target: aarch64-apple-darwin
            archive_os: macos
            archive_arch: aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --locked --release --bin kbolt --target ${{ matrix.target }}

      - name: Package release artifact
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="kbolt-v${version}-${{ matrix.archive_os }}-${{ matrix.archive_arch }}.tar.gz"
          staging="dist/${archive%.tar.gz}"

          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/kbolt" "$staging/"
          cp README.md LICENSE "$staging/"

          tar -C dist -czf "dist/$archive" "${archive%.tar.gz}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: kbolt-${{ matrix.archive_os }}-${{ matrix.archive_arch }}
          path: dist/*.tar.gz

  publish-release:
    needs: build-artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble release bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          find dist -type f -name '*.tar.gz' -exec mv {} release/ \;
          (
            cd release
            shasum -a 256 *.tar.gz > SHA256SUMS
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
