name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Check formatting
        run: cargo fmt --all --check

  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs-site/requirements.txt

      - name: Build docs
        working-directory: docs-site
        run: mkdocs build --strict

      - name: Verify search index
        run: test -f docs-site/site/search/search_index.json

  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --locked --release --bin kbolt

      - name: Smoke test release binary
        shell: bash
        run: |
          set -euo pipefail
          ./target/release/kbolt --help >/dev/null

          tmp_home="$(mktemp -d)"
          set +e
          HOME="$tmp_home" ./target/release/kbolt doctor >/dev/null
          status=$?
          set -e

          if [ "$status" -ne 1 ]; then
            echo "expected kbolt doctor on a fresh HOME to exit 1, got $status" >&2
            exit 1
          fi
